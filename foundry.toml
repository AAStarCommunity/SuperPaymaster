[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "script"
out = "out"
libs = ["contracts/lib", "singleton-paymaster/lib"]
cache_path = "cache"
solc_version = "0.8.33"
optimizer = true
optimizer_runs = 500
via_ir = true
evm_version = "cancun"
# Always emit storage layout so the UUPS storage-drift guard
# (scripts/check_storage_layout.py) can read it from artifacts.
extra_output = ["storageLayout"]

# Include singleton-paymaster libs but exclude tests to avoid conflicts
# Also exclude old test location to prevent duplicates
# exclude = ["singleton-paymaster/test/**/*", "singleton-paymaster/**/*.t.sol"]

# Remappings for dependencies
remappings = [
    "@openzeppelin/contracts/=singleton-paymaster/lib/openzeppelin-contracts-v5.0.2/contracts/",
    "@openzeppelin-v5.0.2/=singleton-paymaster/lib/openzeppelin-contracts-v5.0.2/",
    "@account-abstraction-v7/=singleton-paymaster/lib/account-abstraction-v7/contracts/",
    "@chainlink/contracts/=contracts/lib/chainlink-brownie-contracts/contracts/",
    "solady/=contracts/lib/solady/src/",
    "singleton-paymaster/=singleton-paymaster/",
    "src/=contracts/src/"
]

# Allow writing deployment info
fs_permissions = [{ access = "read-write", path = "./contracts/deployments" }, { access = "read-write", path = "./script" }, { access = "read-write", path = "./" }, { access = "read-write", path = "./script/v3" }]

# ============================================
# V3-Only Profile (Fast Build for Deployment)
# ============================================
# Usage: forge build --profile v3-only
# This profile only compiles V3 core contracts, excluding legacy versions and test contracts
[profile.v3-only]
src = "contracts/src"
test = "contracts/test"
script = "script"
out = "out"
libs = ["contracts/lib", "singleton-paymaster/lib"]
cache_path = "cache"
solc_version = "0.8.33"
optimizer = true
optimizer_runs = 10000
via_ir = false
evm_version = "cancun"

# Exclude all non-V3 contracts
# skip = [
#     "contracts/src/paymasters/v1/**/*",
#     "contracts/src/paymasters/v2/**/*",
#     "contracts/src/paymasters/superpaymaster/v1/**/*",
#     "contracts/src/paymasters/superpaymaster/v2/**/*",
#     "contracts/src/paymasters/PaymasterFactory.sol",
#     "contracts/src/base/Registry_v1.sol",
#     "contracts/src/history/**/*",
#     "script/**/*",
#     "contracts/src/test/**/*",
#     "contracts/src/mocks/**/*",
#     "singleton-paymaster/test/**/*",
#     "singleton-paymaster/**/*.t.sol"
# ]

remappings = [
    "@openzeppelin-v5.0.2/=singleton-paymaster/lib/openzeppelin-contracts-v5.0.2/",
    "@account-abstraction-v7/=singleton-paymaster/lib/account-abstraction-v7/contracts/",
    "@chainlink/contracts/=contracts/lib/chainlink-brownie-contracts/contracts/",
    "solady/=contracts/lib/solady/src/",
    "src/=contracts/src/"
]

fs_permissions = [{ access = "read-write", path = "./contracts/deployments" }, { access = "read-write", path = "./script" }, { access = "read-write", path = "./" }, { access = "read-write", path = "./script/v3" }]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

# ============================================
# Tokens-only profile (skips paper7 scratch dir)
# ============================================
# Usage: forge test --profile tokens
[profile.tokens]
src = "contracts/src"
test = "contracts/test/tokens"
out = "out"
libs = ["contracts/lib", "singleton-paymaster/lib"]
cache_path = "cache"
solc_version = "0.8.33"
optimizer = true
optimizer_runs = 10000
via_ir = true
evm_version = "cancun"
remappings = [
    "@openzeppelin-v5.0.2/=singleton-paymaster/lib/openzeppelin-contracts-v5.0.2/",
    "@account-abstraction-v7/=singleton-paymaster/lib/account-abstraction-v7/contracts/",
    "@chainlink/contracts/=contracts/lib/chainlink-brownie-contracts/contracts/",
    "solady/=contracts/lib/solady/src/",
    "src/=contracts/src/"
]

# ============================================
# Property-based testing config (audit §6 T-H2)
# ============================================
# Top-level [fuzz]/[invariant] tables apply to the default profile. They give
# the new invariant suite (contracts/test/invariant/) enough breadth without a
# CLI override. CI can still pass --fuzz-runs / --invariant-runs to scale up.
[fuzz]
runs = 256

[invariant]
runs = 256              # independent invariant campaigns per test
depth = 500             # handler calls per run
fail_on_revert = false  # handlers intentionally swallow expected reverts
                        # (bound() guards, rate cooldowns, replay rejections)
