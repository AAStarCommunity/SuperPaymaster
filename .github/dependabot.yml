# Dependabot configuration for SuperPaymaster
# This file configures GitHub Dependabot to manage dependency updates
# and security alerts for the project
#
# NOTE: Git submodules (singleton-paymaster/, contracts/lib/, lib/) contain
# upstream dependencies (OpenZeppelin, Pimlico, eth-infinitism, Chainlink).
# Their internal npm dependencies should NOT be updated here — they are pinned
# to specific upstream commits. Only monitor our own root-level dependencies.
#
# If Dependabot still opens PRs for vendored submodule package.json files
# (e.g. singleton-paymaster/lib/**), these are transitive deps of upstream
# tests/docs tooling that we never install, execute, or bundle. Close them.

version: 2
updates:
  # Monitor npm dependencies in the root project + packages/* workspaces ONLY.
  # Explicitly exclude vendored submodule paths so transitive deps of their
  # own test/docs tooling don't generate PR noise here.
  - package-ecosystem: "npm"
    schedule:
      interval: "weekly"
    groups:
      all-dependencies:
        patterns:
          - "*"
    # Limit is shared across the whole npm ecosystem, not per-directory.
    # We monitor 4 directories (/, /packages/*, /subgraph, /script/gasless-tests),
    # so a value of 1 lets a single stuck PR block updates for every other dir.
    # 5 = one slot per directory + 1 buffer for a stale cross-week PR.
    open-pull-requests-limit: 5
    directories:
      - "/"
      - "/packages/*"
      - "/subgraph"
      - "/script/gasless-tests"
      - "!/singleton-paymaster/**"
      - "!/contracts/lib/**"
      - "!/lib/**"
      - "!/standards/**"
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
      - dependency-name: "hardhat"
        update-types: ["version-update:semver-patch", "version-update:semver-minor"]
      - dependency-name: "@sentry/node"
      - dependency-name: "axios"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "cookie"
      - dependency-name: "brace-expansion"
      - dependency-name: "@eslint/plugin-kit"

  # Monitor GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 1
