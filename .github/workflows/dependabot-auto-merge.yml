name: Dependabot auto-merge

# SECURITY NOTE: do NOT add actions/checkout in this workflow.
# pull_request_target runs with write permissions; checking out PR head code
# here would expose those permissions to fork PRs (pwn-request attack).

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Triple guard: actor, PR author, and target repo must all match.
    if: |
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == 'AAStarCommunity/SuperPaymaster'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        # Pinned to v2.3.0 by SHA — verify: git ls-remote https://github.com/dependabot/fetch-metadata.git refs/tags/v2.3.0
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # patch + minor only: auto-approve and queue auto-merge.
      # Actual merge is gated on all required CI checks passing (branch protection).
      - name: Auto-approve patch/minor update
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch/minor update
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # major version bump: label for manual review, never auto-merge.
      - name: Label major update for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr edit "$PR_URL" --add-label "dependencies,major-update"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
