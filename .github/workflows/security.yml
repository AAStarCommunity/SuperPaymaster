name: Security — Stage 1-3 (lint / test / static)

# Fast security gates on every PR/push to main (Phase 1 of the release process).
# Deep scans (mythril / invariant / echidna — Stage 4) run via deep-scan.yml,
# manually triggered before a release.

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
    # Only gate PRs that touch Solidity / build inputs. Docs, shell/JS scripts, ABIs
    # and E2E test files cannot break the contracts, so they skip Stage 1-3 — this
    # avoids running (and flaking) forge test + fuzz on docs-only PRs. Pushes to main
    # always run the full suite regardless of paths.
    paths:
      - 'contracts/**'
      - 'singleton-paymaster/**'
      - 'foundry.toml'
      - 'remappings.txt'
      - 'echidna*.yaml'

jobs:
  lint-build:
    name: Stage 1 — solhint + build (EIP-170)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: stable }   # pin avoids foundryup's GitHub-API release-tag lookup (403 rate-limit)
      - name: Install solhint
        run: npm install -g solhint
      - name: Solhint
        run: solhint 'contracts/src/**/*.sol' || true   # report-only until ruleset tuned
      - name: Build + EIP-170 size (deployable contracts only)
        # `forge build --sizes` exits non-zero if ANY built contract exceeds the 24576-byte
        # EIP-170 limit. `test` and `script` are forge's documented --skip aliases for
        # `.t.sol` / `.s.sol` (see `forge build --help`), so this scopes the gate to the
        # contracts we actually deploy and is not tripped by test-only helpers — e.g.
        # SuperPaymasterV2Reinit, a thin SuperPaymaster subclass used purely for UUPS
        # reinitializer testing that is never deployed.
        run: forge build --sizes --skip test --skip script

  test:
    name: Stage 2 — forge test + fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: stable }   # pin avoids foundryup's GitHub-API release-tag lookup (403 rate-limit)
      - name: Unit + fuzz
        run: |
          forge test -vvv
          forge test --fuzz-runs 10000

  slither:
    name: Stage 3 — Slither static scan
    runs-on: ubuntu-latest
    continue-on-error: true   # via-IR support is partial; advisory until stabilised
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: stable }   # pin avoids foundryup's GitHub-API release-tag lookup (403 rate-limit)
      - name: Slither
        # ADVISORY. crytic-compile/Slither cannot yet reliably compile this via-IR Foundry
        # project: the slither-action container has no `forge` (FileNotFoundError), and
        # --ignore-compile on via-IR build-info errors (KeyError: 'output'). Until that
        # tooling stabilises, a Slither/compile failure must NOT turn this check red —
        # step-level continue-on-error keeps it green while Slither still runs best-effort
        # and surfaces findings as PR annotations. The per-line `slither-disable-next-line`
        # triage (docs/security/slither-triage.md) + fail-on:high stay so the gate enforces
        # automatically once via-IR support lands.
        continue-on-error: true
        uses: crytic/slither-action@v0.4.0
        with:
          target: 'contracts/src'
          slither-config: 'slither.config.json'
          fail-on: high
